name: Generate Streak Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: DenverCoder1/github-readme-streak-stats-action@v0
        with:
          github_user: samueljanringsitio
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_path: streak-stats.svg
          background: 13111E
          stroke: 6366F1
          ring: 818CF8
          fire: C7D2FE
          curr_streak_num: F1F5F9
          curr_streak_label: C7D2FE
          side_nums: F1F5F9
          side_labels: 818CF8
          dates: 6366F1
          hide_border: true
